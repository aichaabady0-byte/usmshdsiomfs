<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USMS CORD - Members</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- BARRE SUPÉRIEURE -->
    <header id="top-bar">
        <div class="logo-usms">USMS <span class="logo-box">CORD</span></div>
        
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search a member...">
        </div>

        <div class="lang-container">
            <label for="lang-select">Language:</label>
            <img id="current-flag" src="https://flagcdn.com/16x12/us.png" alt="flag">
            <select id="lang-select">
                <option value="en" selected>English</option>
                <option value="fr">Français</option>
                <option value="zh">中文</option>
            </select>
        </div>
    </header>

    <!-- SECTION TITRE PRINCIPALE -->
    <div class="main-title-bar">
        <h1 id="page-title">Server Members</h1>
    </div>

    <!-- GRILLE DE TOUS LES MEMBRES -->
    <div id="members-grid">
        <div class="loading" id="loading-text">Loading members...</div>
    </div>

    <!-- FENÊTRE POPUP (MODALE) POUR LES DÉTAILS AU CLIC -->
    <div id="profile-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-modal-btn">&times;</button>
            <div id="modal-body">
                <!-- Rempli dynamiquement en JS -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
