<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USMS CORD</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="util-bar">
        <div class="util-left">
            <span id="tagline">Broadcast Yourself™</span>
        </div>
        <div class="util-right">
            <label for="lang-select">Language:</label>
            <img id="current-flag" src="https://flagcdn.com/16x12/us.png" alt="flag">
            <select id="lang-select">
                <option value="en" selected>English</option>
                <option value="fr">Français</option>
                <option value="zh">中文</option>
            </select>
        </div>
    </div>

    <header id="main-header">
        <div class="logo-container">
            <img src="logo.png" alt="USMS CORD Logo" id="site-logo">
        </div>
        
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search a member...">
        </div>
    </header>

    <div id="page-container">
        
        <div class="section-box">
            <div class="box-title">
                <span id="page-title">Channels / Server Members</span>
            </div>
            
            <div class="box-body">
                <div id="members-grid">
                    <div class="loading" id="loading-text">Loading members...</div>
                </div>
            </div>
        </div>

        <div id="profile-detail-zone" class="section-box blue-box" style="display: none;">
            <div class="box-title-blue">
                <span id="detail-title-text">Member Profile Inspection</span>
            </div>
            <div class="box-body-blue" id="modal-body">
                </div>
        </div>

    </div>

    <footer id="retro-footer">
        <div>
            
        </div>
        <div class="copyright">Copyright © 2026 USMS CORD, LLC</div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
