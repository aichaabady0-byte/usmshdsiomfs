<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USMS CORD</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="util-bar">
        <div class="util-left"><span id="tagline">Broadcast Yourself™</span></div>
        <div class="util-right">
            <span id="user-status-text">Not connected</span>
            <button id="discord-auth-btn">Connect with Discord</button>
        </div>
    </div>

    <header id="main-header">
        <img src="logo.png" alt="USMS CORD Logo" id="site-logo">
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search...">
        </div>
    </header>

    <nav id="nav-tabs">
        <div class="tab active" data-target="page-home">Home</div>
        <div class="tab" data-target="page-members">Channels & Members</div>
    </nav>

    <div id="main-container">
        
        <div id="page-home" class="page-content active-page">
            <div class="two-column-layout">
                <div class="left-column">
                    <div class="section-box">
                        <div class="box-title">Featured Videos</div>
                        <div class="box-body">
                            <div id="videos-grid">
                                </div>
                        </div>
                    </div>
                </div>

                <div class="right-column">
                    <div class="section-box" id="publish-box" style="display:none;">
                        <div class="box-title">Publish a Video</div>
                        <div class="box-body">
                            <form id="publish-form">
                                <div class="form-group">
                                    <label>Video Title:</label>
                                    <input type="text" id="vid-title" required>
                                </div>
                                <div class="form-group">
                                    <label>Video URL (MP4, YouTube, etc.):</label>
                                    <input type="url" id="vid-url" required>
                                </div>
                                <div class="form-group">
                                    <label>Thumbnail URL:</label>
                                    <input type="url" id="vid-thumb" placeholder="https://...">
                                </div>
                                <button type="submit" class="retro-btn">Upload Video</button>
                            </form>
                        </div>
                    </div>

                    <div class="section-box yellow-box" id="fufu-admin-box" style="display:none;">
                        <div class="box-title">Fufu's Management Panel 👑</div>
                        <div class="box-body">
                            <p style="margin-bottom:8px;">Give a Verified Badge:</p>
                            <select id="admin-user-select">
                                <option value="">Select a member...</option>
                            </select>
                            <button id="admin-verify-btn" class="retro-btn" style="margin-top:5px;">Toggle Verified Status</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="video-player-zone" class="section-box" style="display:none; margin-top:20px;">
                <div class="box-title" id="player-video-title">Viewing Video</div>
                <div class="box-body">
                    <div class="video-wrapper">
                        <video id="main-video-element" controls src=""></video>
                    </div>
                    <div class="video-meta-line">
                        <div class="creator-clickable" id="player-creator-info">
                            Uploaded by: <span id="player-creator-name" class="link-blue"></span>
                        </div>
                        <div class="like-system">
                            <button id="like-btn" class="retro-btn">👍 Like</button>
                            <span id="like-count">0</span> likes
                            <button id="dislike-btn" class="retro-btn" style="margin-left:5px;">👎 Dislike</button>
                        </div>
                    </div>
                    <div class="comments-section">
                        <h3>Comments:</h3>
                        <div id="comments-list"></div>
                        <div id="add-comment-zone" style="display:none; margin-top:10px;">
                            <input type="text" id="new-comment-text" placeholder="Add a public comment...">
                            <button id="submit-comment-btn" class="retro-btn">Post</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="page-members" class="page-content">
            <div class="section-box">
                <div class="box-title">Channels / Server Members</div>
                <div class="box-body">
                    <div id="members-grid"></div>
                </div>
            </div>
        </div>

        <div id="profile-detail-zone" class="section-box blue-box" style="display: none;">
            <div class="box-title-blue"><span id="detail-title-text">Member Profile Inspection</span></div>
            <div class="box-body-blue" id="modal-body"></div>
        </div>

    </div>

    <footer id="retro-footer">
        <div><a href="#">About Us</a> | <a href="#">Terms</a> | <a href="#">Help</a></div>
        <div class="copyright">Copyright © 2006 USMS CORD, LLC</div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
