<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USMS - Rétro Communauté</title>
    <!-- Ton logo s'affiche maintenant sur l'onglet du navigateur web -->
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header USMS style BitView / YouTube 2005 -->
    <header id="masthead">
        <div class="logo-container">
            <h1 class="logo">
                <img src="logo.png" alt="USMS Logo" class="logo-img">
            </h1>
        </div>
        
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Rechercher un membre...">
            <button class="yt-button" id="btn-search">Rechercher</button>
        </div>

        <!-- Sélecteur de langue rétro avec les vrais drapeaux d'époque -->
        <div class="language-selector">
            <span id="txt-lang-label">Language:</span>
            <div class="flag-links">
                <a href="#" data-lang="en" title="English">
                    <img src="https://flagcdn.com/16x12/us.png" alt="English">
                </a>
                <a href="#" data-lang="fr" title="Français">
                    <img src="https://flagcdn.com/16x12/fr.png" alt="Français">
                </a>
                <a href="#" data-lang="zh" title="中文">
                    <img src="https://flagcdn.com/16x12/cn.png" alt="中文">
                </a>
            </div>
        </div>
    </header>

    <div class="container">
        <!-- Liste de gauche (Membres) -->
        <aside class="sidebar">
            <div class="box-header" id="title-list">Membres Connectés</div>
            <ul id="users-list" class="user-list">
                <!-- Les membres injectés par script.js -->
            </ul>
        </aside>

        <!-- Contenu de droite (Fiche Profil) -->
        <main class="main-content">
            <div class="box-header" id="title-details">Fiche Profil USMS</div>
            <div id="details-box" class="profile-box">
                <div class="no-selection">
                    <p id="txt-no-selection">Sélectionnez un membre de la communauté à gauche pour charger ses détails.</p>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
