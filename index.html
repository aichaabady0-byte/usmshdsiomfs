<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USMSCord - Broadcast Yourself™</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome pour les petites icônes rétro -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- UTILITY HEADER (Barre du haut 2006) -->
    <div id="util-bar">
        <div class="util-left">
            <span id="tagline">Broadcast Yourself™</span>
        </div>
        <div class="util-right">
            <label for="lang-select">Language:</label>
            <select id="lang-select">
                <option value="en" selected>English</option>
                <option value="fr">Français</option>
                <option value="zh">中文</option>
            </select>
            <img id="current-flag" src="https://flagcdn.com/16x12/us.png" alt="flag">
        </div>
    </div>

    <!-- MAIN HEADER LOGO & TABS -->
    <header id="main-header">
        <div class="logo-container">
            <!-- Le fameux logo avec la boîte rouge/orange autour de "Cord" -->
            <div class="logo-usms">USMS<span class="logo-box">Cord</span></div>
        </div>
        
        <!-- Onglets style YouTube Classique -->
        <nav id="nav-tabs">
            <a href="#" class="tab-item">Home</a>
            <a href="#" class="tab-item">Videos</a>
            <a href="#" class="tab-item id-active">Channels & Members</a>
            <a href="#" class="tab-item">Community</a>
        </nav>
    </header>

    <!-- MAIN CONTENT AREA -->
    <div id="page-container">
        
        <!-- COLONNE GAUCHE : LISTE DES MEMBRES DISCORD -->
        <div id="left-column">
            <div class="section-box">
                <div class="box-title">
                    <span id="box-title-text">Discord Members</span>
                </div>
                <div class="box-body">
                    <ul id="users-list">
                        <li class="loading-item">Loading members...</li>
                    </ul>
                </div>
            </div>
        </div>

        <!-- COLONNE DROITE : PROFIL DU MEMBRE SÉLECTIONNÉ -->
        <div id="right-column">
            <div class="section-box blue-box">
                <div class="box-title">
                    <span id="profile-title-text">Member Profile Card</span>
                </div>
                <div class="box-body" id="details-box">
                    <div class="no-selection">
                        <i class="fa-solid fa-arrow-left" style="margin-right: 5px;"></i>
                        Select a member on the left to inspect their vintage profile card.
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- FOOTER 2006 -->
    <footer id="retro-footer">
        <div>
            <a href="#">About Us</a> | <a href="#">Terms of Use</a> | <a href="#">Privacy Policy</a> | <a href="#">Help</a>
        </div>
        <div class="copyright">Copyright © 2006 USMSCord, LLC</div>
    </footer>

    <!-- Liaison avec Firebase et le script -->
    <script type="module" src="script.js"></script>
</body>
</html>
