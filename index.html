<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiscordTube - Broadcast Your Members</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header YouTube 2005 -->
    <header id="masthead">
        <div class="logo-container">
            <h1 class="logo">Discord<span class="red-box">Tube</span></h1>
            <span class="tagline">Broadcast Yourself™</span>
        </div>
        <div class="search-bar">
            <input type="text" placeholder="Rechercher un membre..." disabled>
            <button class="yt-button">Rechercher</button>
        </div>
    </header>

    <!-- Conteneur Principal -->
    <div class="container">
        
        <!-- Colonne Gauche : Liste des utilisateurs -->
        <aside class="sidebar">
            <div class="box-header">Membres du Serveur</div>
            <ul id="users-list" class="user-list">
                <!-- Injecté par JavaScript -->
            </ul>
        </aside>

        <!-- Colonne Droite : Détails du membre -->
        <main class="main-content">
            <div class="box-header">Description du Profil</div>
            <div id="details-box" class="profile-box">
                <div class="no-selection">
                    <p>Sélectionnez un membre à gauche pour afficher ses détails Discord.</p>
                </div>
            </div>
        </main>
        
    </div>

    <script src="script.js"></script>
</body>
</html>
