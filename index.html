<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube - Broadcast Yourself (Discord Edition)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="yt-header">
        <div class="logo-area">
            <span class="logo-yt">Your<span class="box-red">Discord</span></span>
            <span class="slogan">Broadcast Your Members</span>
        </div>
        <nav class="main-nav">
            <a href="#" class="active">Accueil</a>
            <a href="#">Vidéos (Membres)</a>
            <a href="#">Chaînes</a>
        </nav>
    </header>

    <div class="container">
        <main class="main-content">
            <div class="section-title">Membres du serveur</div>
            <div id="members-grid" class="grid">
                </div>
        </main>

        <aside class="sidebar" id="detail-sidebar">
            <div class="section-title">Informations détaillées</div>
            <div id="detail-content">
                <p class="placeholder-text">Cliquez sur un membre pour voir son profil.</p>
            </div>
        </aside>
    </div>

    <script src="app.js"></script>
</body>
</html>
