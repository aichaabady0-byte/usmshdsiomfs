<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USMSCord - USMS Community</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header USMSCord style BitView / YouTube 2005 -->
    <header id="masthead">
        <div class="logo-container">
            <h1 class="logo">
                <img src="logo.png" alt="USMS Logo" class="logo-img">
                <span class="blue-box">Cord</span>
            </h1>
            <span class="tagline" id="txt-tagline">Broadcast Yourself™</span>
        </div>
        
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Rechercher un membre...">
            <button class="yt-button" id="btn-search">Rechercher</button>
        </div>

        <!-- Sélecteur de langue rétro -->
        <div class="language-selector">
            <label for="lang-select">Language:</label>
            <select id="lang-select">
                <option value="en">English</option>
                <option value="fr" selected>Français</option>
                <option value="zh">中文 (Chinois)</option>
            </select>
        </div>
    </header>

    <div class="container">
        <!-- Liste de gauche (Membres) -->
        <aside class="sidebar">
            <div class="box-header" id="title-list">Membres Connectés</div>
            <ul id="users-list" class="user-list">
                <!-- Les membres injectés par script.js apparaîtront ici -->
            </ul>
        </aside>

        <!-- Contenu de droite (Fiche Profil) -->
        <main class="main-content">
            <div class="box-header" id="title-details">Fiche Profil USMSCord</div>
            <div id="details-box" class="profile-box">
                <div class="no-selection">
                    <p id="txt-no-selection">Sélectionnez un membre de la communauté à gauche pour charger ses détails.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Le script chargé tout en bas après la création du HTML -->
    <script src="script.js"></script>
</body>
</html>
